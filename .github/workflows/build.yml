name: Build ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v "${{ github.workspace }}:/repo" \
          ubuntu:24.04 bash -euo pipefail -c '
          export DEBIAN_FRONTEND=noninteractive

          # The ARM64 image uses ports.ubuntu.com. HTTPS avoids runners where
          # outbound plain HTTP is unavailable, and retries handle mirror hiccups.
          sed -i "s|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g" \
            /etc/apt/sources.list.d/ubuntu.sources
          apt-get -o Acquire::Retries=3 -o APT::Update::Error-Mode=any update
          apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
            gcc g++ cmake pkg-config make file \
            libjson-c-dev libglib2.0-dev libdbus-1-dev libsystemd-dev \
            libgtk-4-dev libadwaita-1-dev dpkg-dev

          # Build everything
          cmake -S /repo -B /repo/build-arm64 \
            -DBUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /repo/build-arm64 --parallel "$(nproc)"

          # Build deb package
          cd /repo/build-arm64
          cpack -G DEB

          file uperf-linux uperfctl uperf-wizard gui/uperf-gui
          ls -lh uperf-linux uperfctl uperf-wizard gui/uperf-gui
          ls -lh *.deb
        '

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: uperf-linux-arm64-binaries
        path: |
          ${{ github.workspace }}/build-arm64/uperf-linux
          ${{ github.workspace }}/build-arm64/uperfctl
          ${{ github.workspace }}/build-arm64/uperf-wizard
          ${{ github.workspace }}/build-arm64/gui/uperf-gui
        retention-days: 7

    - name: Upload deb package
      uses: actions/upload-artifact@v4
      with:
        name: uperf-linux-arm64-deb
        path: ${{ github.workspace }}/build-arm64/*.deb
        retention-days: 7
