name: Build ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo sed -i \
          "s|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g" \
          /etc/apt/sources.list.d/ubuntu.sources
        sudo apt-get \
          -o Acquire::ForceIPv4=true \
          -o Acquire::Retries=3 \
          -o APT::Update::Error-Mode=any \
          update
        sudo env DEBIAN_FRONTEND=noninteractive \
          apt-get \
          -o Acquire::ForceIPv4=true \
          -o Acquire::Retries=3 \
          install -y --no-install-recommends \
          gcc g++ cmake pkg-config make file \
          libjson-c-dev libglib2.0-dev libdbus-1-dev libsystemd-dev \
          libpolkit-gobject-1-dev \
          libgtk-4-dev libadwaita-1-dev dpkg-dev

    - name: Build
      run: |
        cmake -S . -B build-arm64 \
          -DBUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build build-arm64 --parallel "$(nproc)"

    - name: Test
      run: ctest --test-dir build-arm64 --output-on-failure --parallel "$(nproc)"

    - name: Build DEB package
      working-directory: build-arm64
      run: |
        cpack -G DEB

        file uperf-linux uperfctl uperf-wizard gui/uperf-gui
        ls -lh uperf-linux uperfctl uperf-wizard gui/uperf-gui
        ls -lh ./*.deb

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: uperf-linux-arm64-binaries
        path: |
          ${{ github.workspace }}/build-arm64/uperf-linux
          ${{ github.workspace }}/build-arm64/uperfctl
          ${{ github.workspace }}/build-arm64/uperf-wizard
          ${{ github.workspace }}/build-arm64/gui/uperf-gui
        retention-days: 7

    - name: Upload deb package
      uses: actions/upload-artifact@v4
      with:
        name: uperf-linux-arm64-deb
        path: ${{ github.workspace }}/build-arm64/*.deb
        retention-days: 7
