name: Build ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/repo ubuntu:24.04 bash -c '
          apt-get update && apt-get install -y gcc g++ cmake pkg-config make file \
            libjson-c-dev libglib2.0-dev libdbus-1-dev libsystemd-dev \
            qt6-base-dev qt6-charts-dev qt6-declarative-dev

          # Build everything
          cd /repo && mkdir -p build-arm64 && cd build-arm64
          cmake .. -DBUILD_TESTS=OFF
          make -j$(nproc)

          file uperf-linux uperfctl uperf-wizard gui/uperf-gui
          ls -lh uperf-linux uperfctl uperf-wizard gui/uperf-gui
        '

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: uperf-linux-arm64
        path: |
          ${{ github.workspace }}/build-arm64/uperf-linux
          ${{ github.workspace }}/build-arm64/uperfctl
          ${{ github.workspace }}/build-arm64/uperf-wizard
          ${{ github.workspace }}/build-arm64/gui/uperf-gui
        retention-days: 7
