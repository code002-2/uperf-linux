<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the root daemon may own the well-known service name. -->
  <policy user="root">
    <allow own="org.uperflinux.Daemon"/>
  </policy>

  <!-- These calls must reach the daemon so it can authorize each caller with
       Polkit. Allowing them here does not by itself grant the operation. -->
  <policy context="default">
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.uperflinux.Daemon"
           send_member="SetMode"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.uperflinux.Daemon"
           send_member="SetGameMode"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.uperflinux.Daemon"
           send_member="SetActiveProcess"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.uperflinux.Daemon"
           send_member="SetManualFreq"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.uperflinux.Daemon"
           send_member="ReloadConfig"
           send_type="method_call"/>

    <!-- State inspection is intentionally read-only. -->
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Get"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="GetAll"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.freedesktop.DBus.Peer"
           send_member="Ping"
           send_type="method_call"/>
    <allow send_destination="org.uperflinux.Daemon"
           send_path="/org/uperflinux/Daemon"
           send_interface="org.freedesktop.DBus.Peer"
           send_member="GetMachineId"
           send_type="method_call"/>

    <allow receive_sender="org.uperflinux.Daemon"
           receive_path="/org/uperflinux/Daemon"
           receive_interface="org.uperflinux.Daemon"
           receive_type="signal"/>
  </policy>
</busconfig>
